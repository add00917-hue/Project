<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<base target="_top">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Gantt Chart Project Horizon</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e16; --surf:#0f141f; --panel:#141b29; --card:#18212f; --b1:#222c3e; --b2:#2d3a50;
  --tx:#e6edf7; --sub:#93a3bd; --mut:#5b6b85; --acc:#4f8fff; --acc2:#7b9dff;
  --green:#1fd6a0; --blue:#4f8fff; --red:#f44f6c; --amber:#f6a92e; --grey:#8a9db8;
  --tw:300px; --col:30px; --rowh:36px;
  --shadow:0 18px 40px rgba(0,0,0,.45);
  --radius:14px; --safe-b:env(safe-area-inset-bottom,0px);
}
body.light{
  --bg:#eef2f8; --surf:#ffffff; --panel:#f4f7fc; --card:#eef2fa; --b1:#dde4ef; --b2:#c7d2e3;
  --tx:#16203a; --sub:#4a5a78; --mut:#8595b0; --acc:#1a60e8; --acc2:#3a78f0;
  --shadow:0 18px 40px rgba(20,40,80,.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg);color:var(--tx);font-family:'Inter',system-ui,sans-serif;font-size:13px;
  transition:background .25s,color .25s;overflow:hidden}
.mono{font-family:'JetBrains Mono',monospace}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit}

/* ---------- app frame ---------- */
.app{display:flex;flex-direction:column;height:100dvh}
.appbar{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--surf);
  border-bottom:1px solid var(--b1);flex-shrink:0;z-index:50}
.logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#1a4fd8,#4f8fff);
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:11px;
  box-shadow:0 0 16px rgba(79,143,255,.35);flex-shrink:0}
.brand b{font-size:14px;font-weight:700;display:block;line-height:1.15}
.brand span{font-size:10px;color:var(--mut)}
.spacer{flex:1}
.dd-wrap{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--b2);
  padding:5px 9px;border-radius:9px}
.dd-wrap label{font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:.08em}
.dd-wrap input{background:transparent;border:none;color:var(--tx);font-size:12px;outline:none;width:120px}
.iconbtn{width:34px;height:34px;border-radius:9px;background:var(--panel);border:1px solid var(--b2);
  display:flex;align-items:center;justify-content:center;color:var(--sub);transition:.15s}
.iconbtn:hover{border-color:var(--acc);color:var(--acc)}
.userchip{display:flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--b2);
  border-radius:20px;padding:4px 10px 4px 4px}
.avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#7b9dff,#4f8fff);
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700}
.userchip small{font-size:10px;color:var(--mut);display:block}
.userchip b{font-size:11px}
.role-pill{font-size:8px;padding:2px 6px;border-radius:10px;background:rgba(79,143,255,.15);color:var(--acc);text-transform:uppercase;letter-spacing:.06em}
.savestat{font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:4px;color:var(--mut);opacity:0;transition:opacity .2s;white-space:nowrap}
.connstat{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:700;padding:4px 10px;border-radius:20px;border:1px solid var(--b2);background:var(--panel);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:.15s}
.connstat .dot{width:7px;height:7px;border-radius:50%;background:var(--mut);flex-shrink:0}
.connstat.online{color:var(--green);border-color:rgba(31,214,160,.4)} .connstat.online .dot{background:var(--green);box-shadow:0 0 7px var(--green)}
.connstat.connecting{color:var(--amber);border-color:rgba(246,169,46,.4)} .connstat.connecting .dot{background:var(--amber);animation:connpulse 1s infinite}
.connstat.offline{color:var(--red);border-color:rgba(244,79,108,.4)} .connstat.offline .dot{background:var(--red)}
@keyframes connpulse{0%,100%{opacity:1}50%{opacity:.25}}
@media(max-width:980px){ .connstat .txt{display:none} .connstat{padding:6px} }
.savestat.on{opacity:1}
.savestat.saving{color:var(--amber)} .savestat.saved{color:var(--green)} .savestat.err{color:var(--red)}
input.cell-saving{box-shadow:inset 0 0 0 1px var(--amber)!important;background:rgba(246,169,46,.14)!important}
input.cell-saved{box-shadow:inset 0 0 0 1px var(--green)!important;background:rgba(31,214,160,.16)!important;transition:background .3s,box-shadow .3s}
input.cell-error{box-shadow:inset 0 0 0 1px var(--red)!important;background:rgba(244,79,108,.16)!important}
@media(max-width:820px){ .savestat{font-size:0}.savestat::after{content:''} .savestat.saving::before{content:'⟳';font-size:13px}.savestat.saved::before{content:'✓';font-size:13px}.savestat.err::before{content:'⚠';font-size:13px} }

/* ---------- top tabs (tablet/desktop) ---------- */
.tabs{display:flex;gap:2px;padding:0 14px;background:var(--surf);border-bottom:1px solid var(--b1);flex-shrink:0}
.tab{padding:11px 16px;font-size:12.5px;font-weight:600;color:var(--mut);border-bottom:2px solid transparent;
  display:flex;align-items:center;gap:7px;transition:.15s}
.tab.on{color:var(--acc);border-bottom-color:var(--acc)}
.tab:hover{color:var(--sub)}
.tab svg{width:15px;height:15px}

.main{flex:1;overflow:auto;position:relative}
.wrap{max-width:1480px;margin:0 auto;padding:18px}
@media(min-width:2400px){ .wrap{max-width:2000px} }

/* ---------- dashboard ---------- */
.h1{font-size:20px;font-weight:800;margin-bottom:2px}
.h1s{font-size:12px;color:var(--mut);margin-bottom:18px}
.cards{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.card{background:var(--card);border:1px solid var(--b1);border-radius:var(--radius);padding:16px}
.card .lab{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.card .num{font-size:30px;font-weight:800;line-height:1.1;margin-top:6px}
.sec-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--sub);
  margin:22px 0 10px;display:flex;align-items:center;gap:8px}
.sec-title::before{content:'';width:3px;height:14px;border-radius:2px;background:var(--acc)}
.tablecard{background:var(--card);border:1px solid var(--b1);border-radius:var(--radius);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--panel);color:var(--sub);font-size:10px;text-transform:uppercase;letter-spacing:.05em;
  font-weight:600;padding:9px 10px;text-align:center;white-space:nowrap}
thead th:first-child,tbody td:first-child{text-align:left}
tbody td{padding:9px 10px;text-align:center;border-top:1px solid var(--b1);white-space:nowrap}
tbody tr:hover{background:rgba(127,150,190,.06)}
.cat-cell{font-weight:700;border-left:3px solid var(--acc);text-align:left;padding-left:10px}
.eqgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
.eqbox{background:var(--card);border:1px solid var(--b1);border-radius:11px;padding:12px;text-align:center}
.eqbox .lab{font-size:9px;color:var(--mut);text-transform:uppercase}
.eqbox .num{font-size:20px;font-weight:800;margin-top:4px}

/* ---------- gantt ---------- */
.toolbar{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--b1);
  background:var(--surf);position:sticky;top:0;z-index:30;flex-wrap:wrap}
.tb-title{font-weight:700;font-size:14px}
.filters{display:flex;gap:3px;background:var(--panel);border:1px solid var(--b2);border-radius:9px;padding:3px}
.fbtn{padding:5px 11px;font-size:11px;font-weight:600;color:var(--mut);border-radius:6px}
.fbtn.on{background:var(--card);color:var(--tx)}
.legend-min{display:flex;gap:12px;align-items:center;font-size:10px;color:var(--mut);flex-wrap:wrap}
.mrange{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--sub);background:var(--panel);border:1px solid var(--b2);border-radius:9px;padding:4px 9px}
.mrange select{background:transparent;border:none;color:var(--tx);font-size:12px;font-weight:600;outline:none;cursor:pointer}
.mrange span{color:var(--mut)}
.lm{display:flex;align-items:center;gap:5px}.sw{width:18px;height:8px;border-radius:3px}

.gantt{overflow:auto;height:100%}
.grow{display:flex;align-items:stretch;border-bottom:1px solid var(--b1);min-height:var(--rowh)}
.gcorner,.gtask{width:var(--tw);min-width:var(--tw);position:sticky;left:0;z-index:6;background:var(--surf);
  border-right:1px solid var(--b2);display:flex;align-items:center;gap:6px;padding:0 8px}
.ghead{position:sticky;top:0;z-index:8}
.gcorner{flex-direction:column;align-items:flex-start;justify-content:flex-end;padding-bottom:6px;height:56px;background:var(--surf)}
.gcorner .a{font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:.1em}
.track{position:relative;flex-shrink:0}
.thead-track{height:56px;position:sticky;top:0;z-index:7;background:var(--surf);border-bottom:1px solid var(--b2)}
.mrow{height:28px;display:flex;border-bottom:1px solid var(--b1)}
.mcell{flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-right:1px solid var(--b1);color:var(--tx);overflow:hidden;line-height:1.12;text-align:center}
.mcell b{font-size:11px;font-weight:700;letter-spacing:.01em}
.mcell small{font-size:8px;color:var(--mut);font-weight:600;letter-spacing:.02em}
.wrow{height:28px;display:flex}
.wcell{flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--mut);
  border-right:1px solid var(--b1)}
.wcell.dd{background:rgba(79,143,255,.18);color:var(--acc);font-weight:700}

.grp .gtask{background:var(--panel);font-weight:700}
.grp{background:var(--panel)}
.gtask .no{font-size:9px;color:var(--mut);width:30px;flex-shrink:0;text-align:right}
.gtask .nm{flex:1;min-width:0;font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@media(min-width:821px){
  .gtask .nm{white-space:normal;overflow:visible;text-overflow:clip;line-height:1.25;word-break:break-word;padding:5px 0}
  .grow{align-items:stretch}
}
.gtask .nm.sub{font-weight:500;color:var(--sub);font-size:11.5px}
.caret{width:14px;flex-shrink:0;color:var(--mut);transition:transform .15s;font-size:10px}
.caret.open{transform:rotate(90deg)}
.badge{font-size:8px;padding:2px 6px;border-radius:10px;font-weight:700;white-space:nowrap;flex-shrink:0}
.editable{cursor:pointer}
.editable:hover{background:rgba(79,143,255,.05)}

.tcell-bg{position:absolute;inset:0;pointer-events:none}
.ddline{position:absolute;top:0;bottom:0;width:2px;background:rgba(79,143,255,.55);z-index:2;pointer-events:none}
.bar{position:absolute;border-radius:5px;z-index:3}
.bar.plan{top:50%;transform:translateY(-50%);height:20px;opacity:.42}
.bar.act{top:50%;transform:translateY(-50%);height:12px;box-shadow:0 1px 4px rgba(0,0,0,.25)}
.bar-lbl{position:absolute;left:6px;top:50%;transform:translateY(-50%);font-size:9px;font-weight:700;
  color:#fff;white-space:nowrap;z-index:4;pointer-events:none;text-shadow:0 1px 2px rgba(0,0,0,.4)}

/* ---------- bottom nav (mobile) ---------- */
.bottomnav{display:none}
@media(max-width:820px){
  .tabs{display:none}
  .wrap{padding:12px}
  .cards{grid-template-columns:repeat(2,1fr)}
  .eqgrid{grid-template-columns:repeat(4,1fr)}
  .dd-wrap input{width:92px}
  .brand span{display:none}
  .main{padding-bottom:64px}
  .bottomnav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:60;
    background:var(--surf);border-top:1px solid var(--b1);padding:6px 6px calc(6px + var(--safe-b));
    justify-content:space-around;box-shadow:0 -8px 24px rgba(0,0,0,.25)}
  .navitem{display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 12px;border-radius:12px;
    color:var(--mut);font-size:9.5px;font-weight:600;min-width:56px}
  .navitem.on{color:var(--acc);background:rgba(79,143,255,.1)}
  .navitem svg{width:21px;height:21px}
  .toolbar{position:sticky;top:0}
}
@media(max-width:560px){
  :root{--tw:140px;--col:22px;--rowh:40px}
  .cards{grid-template-columns:repeat(2,1fr)}
  .eqgrid{grid-template-columns:repeat(2,1fr)}
  .userchip .meta{display:none}
  .h1{font-size:17px}
}

/* ---------- tooltip ---------- */
.tip{position:fixed;z-index:200;background:var(--card);border:1px solid var(--b2);border-radius:11px;
  padding:11px 13px;box-shadow:var(--shadow);font-size:12px;min-width:200px;opacity:0;pointer-events:none;
  transition:opacity .12s;transform:translateY(4px)}
.tip.show{opacity:1;transform:translateY(0)}
.tip h4{font-size:13px;margin-bottom:8px}
.tip .row{display:flex;justify-content:space-between;gap:14px;margin:3px 0}
.tip .k{color:var(--mut);font-size:10px;text-transform:uppercase}
.tip .v{font-weight:600}

/* ---------- modal / sheet ---------- */
.scrim{position:fixed;inset:0;background:rgba(4,8,16,.6);backdrop-filter:blur(3px);z-index:300;
  display:none;align-items:center;justify-content:center;padding:16px}
.scrim.show{display:flex}
.modal{background:var(--surf);border:1px solid var(--b2);border-radius:18px;width:100%;max-width:440px;
  box-shadow:var(--shadow);overflow:hidden;animation:pop .2s ease}
@keyframes pop{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}
.modal-h{padding:16px 18px;border-bottom:1px solid var(--b1)}
.modal-h b{font-size:15px}.modal-h small{display:block;color:var(--mut);font-size:11px;margin-top:2px}
.modal-b{padding:18px}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field label{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px}
.field input{width:100%;background:var(--panel);border:1px solid var(--b2);border-radius:9px;padding:9px;color:var(--tx);font-size:13px}
.field.plan input{border-color:rgba(79,143,255,.4)}
.field.act input{border-color:rgba(31,214,160,.4)}
.modal-f{padding:14px 18px;border-top:1px solid var(--b1);display:flex;gap:10px;justify-content:flex-end}
.btn{padding:9px 16px;border-radius:9px;font-size:12.5px;font-weight:700}
.btn.ghost{background:var(--panel);border:1px solid var(--b2);color:var(--sub)}
.btn.primary{background:linear-gradient(135deg,#1a4fd8,#4f8fff);color:#fff}
.btn.danger{background:transparent;color:var(--red)}
@media(max-width:560px){
  .scrim{align-items:flex-end;padding:0}
  .modal{max-width:100%;border-radius:20px 20px 0 0;animation:slideup .25s ease}
  @keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);z-index:400;
  background:var(--card);border:1px solid var(--b2);border-radius:11px;padding:11px 18px;font-size:12.5px;
  box-shadow:var(--shadow);opacity:0;transition:.2s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:500;flex-direction:column;gap:14px}
.spin{width:34px;height:34px;border:3px solid var(--b2);border-top-color:var(--acc);border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
/* admin actions + details */
.acts{display:flex;gap:3px;flex-shrink:0;margin-left:6px;opacity:0;transition:.12s}
.grow:hover .acts,.gtask:hover .acts{opacity:1}
.act{width:22px;height:22px;border-radius:6px;background:var(--panel);border:1px solid var(--b2);color:var(--sub);
  font-size:11px;display:inline-flex;align-items:center;justify-content:center;line-height:1}
.act:hover{border-color:var(--acc);color:var(--acc)}
.act.add{color:var(--green);font-weight:800}.act.add:hover{border-color:var(--green)}
.act.del:hover{border-color:var(--red);color:var(--red)}
.dchip{font-size:9px;font-weight:700;background:rgba(79,143,255,.16);color:var(--acc);border-radius:9px;padding:1px 6px;flex-shrink:0}
.btn.mini{padding:3px 9px;font-size:11px;border-radius:7px}
.muted{color:var(--mut)}
.dtbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px}
.dtbl th{background:var(--panel);color:var(--sub);font-size:9px;text-transform:uppercase;padding:6px;border:1px solid var(--b1)}
.dtbl td{border:1px solid var(--b1);padding:2px}
.dtbl input{width:100%;min-width:38px;background:transparent;border:none;color:var(--tx);font-size:12px;text-align:center;outline:none;padding:6px 3px;border-radius:5px}
.dtbl input.rmk{text-align:left;min-width:80px}
.dtbl input:focus{background:rgba(79,143,255,.12);box-shadow:inset 0 0 0 1px var(--acc)}
.dtbl select{background:var(--panel);border:1px solid var(--b2);color:var(--tx);border-radius:6px;padding:4px 6px;font-size:12px}
@media(max-width:820px){ .acts{opacity:1} .bottomnav{overflow-x:auto;justify-content:flex-start} .navitem{flex-shrink:0;min-width:52px} }

/* details tree */
.dwrap{padding:8px 0}
.dgrp{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:9px 14px;margin-top:6px;background:var(--panel)}
.drow{display:flex;align-items:center;gap:8px;padding:7px 14px;border-bottom:1px solid var(--b1)}
.drow.parent{cursor:pointer;font-size:12.5px;color:var(--tx)}
.drow.parent:hover{background:var(--tr-hover,rgba(127,150,190,.05))}
.drow.parent b{font-weight:700}
.drow.leaf{background:rgba(127,150,190,.03)}
.leafname{font-weight:600;color:var(--acc)}
.dno{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--mut);margin-left:auto}
.addsub{margin-left:auto;color:var(--green)!important}
.subitems{padding:6px 14px 12px}

.empty{padding:40px;text-align:center;color:var(--mut);font-size:13px}

/* progress hero */
.hero{display:flex;align-items:center;gap:20px;background:var(--card);border:1px solid var(--b1);
  border-radius:var(--radius);padding:18px 22px;margin-bottom:18px;flex-wrap:wrap}
.ring{--p:0;width:80px;height:80px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  background:conic-gradient(var(--acc) calc(var(--p)*1%), var(--b1) 0)}
.ring span{width:62px;height:62px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px}
.hero-meta{flex:1;min-width:180px}
.hl{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;font-weight:700}
.hb{height:8px;border-radius:4px;background:var(--b1);margin:9px 0;overflow:hidden}
.hbf{height:100%;border-radius:4px;background:linear-gradient(90deg,#1a4fd8,#4f8fff)}
.hs{font-size:11px;color:var(--sub)}
.hero-cats{display:flex;gap:18px;flex-wrap:wrap}
.hcat{font-size:11px;color:var(--sub)}.hcat span{display:block;color:var(--mut);font-size:10px;text-transform:uppercase;letter-spacing:.05em}
.hcat b{font-size:18px;font-weight:800;color:var(--tx)}
.pbarmini{height:6px;border-radius:3px;background:var(--b1);overflow:hidden;width:64px;display:inline-block;vertical-align:middle;margin-right:6px}
.pbarmini>i{display:block;height:100%;background:var(--acc);border-radius:3px}

/* gantt summary strip */
.strip{display:flex;gap:10px;padding:12px 16px;border-bottom:1px solid var(--b1);background:var(--surf);flex-wrap:wrap;flex-shrink:0}
.scard{background:var(--card);border:1px solid var(--b1);border-radius:11px;padding:9px 14px;min-width:104px;flex:1}
.scard.prog{min-width:200px;flex:2}
.scard .lab{font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;font-weight:700}
.scard .num{font-size:20px;font-weight:800;margin-top:2px}

/* equipment table */
.eqtable-wrap{padding:14px 16px;overflow:auto}
.eqtable{width:100%;border-collapse:collapse;font-size:12px;min-width:820px}
.eqtable th{position:sticky;top:0;z-index:2;background:var(--panel);color:var(--sub);font-size:10px;text-transform:uppercase;
  padding:8px;border:1px solid var(--b1);white-space:nowrap;text-align:center}
.eqtable td{border:1px solid var(--b1);padding:2px 4px;text-align:center}
.eqtable tr.grp td{background:var(--panel);font-weight:800;font-size:11px;text-align:left;padding:7px 10px}
.eqtable tr.flr td{background:rgba(127,150,190,.05);font-weight:700;text-align:left}
.eqtable td.dept{text-align:left;white-space:nowrap}
.eqtable input{width:100%;min-width:42px;background:transparent;border:none;color:var(--tx);font-size:12px;text-align:center;
  outline:none;border-radius:5px;padding:6px 3px}
.eqtable input.rmk{text-align:left;min-width:120px}
.eqtable input:focus{background:rgba(79,143,255,.12);box-shadow:inset 0 0 0 1px var(--acc)}
.eqtable input:disabled{color:var(--sub)}
.eqtable tr.totrow td{font-weight:800;background:rgba(79,143,255,.07)}

/* modal equipment */
.modlbl{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin:16px 0 8px}
.rollnote{font-size:11px;color:var(--amber);background:rgba(246,169,46,.1);border:1px solid rgba(246,169,46,.3);border-radius:8px;padding:8px 10px;margin-bottom:10px}
.attbtn{display:inline-flex;align-items:center;gap:3px;background:var(--panel);border:1px solid var(--b2);border-radius:7px;padding:3px 8px;font-size:12px;color:var(--sub)}
.attbtn:hover{border-color:var(--acc);color:var(--acc)}
.attbtn.has{color:var(--acc);border-color:rgba(79,143,255,.4);background:rgba(79,143,255,.08)}
.attn{font-size:10px;font-weight:800}
.attadd{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.attgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.attcard{border:1px solid var(--b1);border-radius:10px;overflow:hidden;background:var(--card)}
.attcard img{width:100%;height:96px;object-fit:cover;display:block;cursor:zoom-in}
.attcard.file{display:flex;flex-direction:column}
.attcard .filelink{font-size:30px;text-align:center;padding:18px 0;text-decoration:none}
.attmeta{display:flex;align-items:center;gap:4px;padding:5px 7px;border-top:1px solid var(--b1)}
.attmeta .nm{flex:1;font-size:10px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.eqmini{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:560px){ .eqmini{grid-template-columns:repeat(3,1fr)} .hero{gap:14px} .hero-cats{width:100%} }

    if(r.children.length){
      var leaves=descLeaves(r,byNo);
      r.ps=mn(leaves,'ps');r.pf=mx(leaves,'pf');r.as=mn(leaves,'as');r.af=mx(leaves,'af'); r.leaf=false;
    } else {
      r.leaf=true;
      var ds=(S.details||[]).filter(function(d){return d.sheet===capName&&d.group===r.group&&d.no===r.no;});
      if(ds.length){ r.ps=mn(ds,'ps');r.pf=mx(ds,'pf');r.as=mn(ds,'as');r.af=mx(ds,'af'); r.fromDetails=true; r.detailCount=ds.length; }
    }
    r.status=statusOf(r);
  });
  return {rows:rows,byNo:byNo};

function bars(r,cw){

  var clr=r.color||'#4f8fff';
  bar(r.ps,r.pf,'plan',clr);
  bar(r.as,r.af,'act',clr,'');
  return out;
}
function flatVisible(M,key){
  var out=[]; var byGroup={}; var order=[];
  M.rows.forEach(function(r){ if(byGroup[r.group]===undefined){byGroup[r.group]=[];order.push(r.group);} byGroup[r.group].push(r); });
  order.forEach(function(g){
    var clr=(GROUPMETA[capSheet(key)]&&GROUPMETA[capSheet(key)][g])||'#4f8fff';
    var roots=byGroup[g].filter(function(r){return r.depth===0;});
    if(S.filter!=='all' && !byGroup[g].some(function(r){return r.leaf&&statusOf(r)===S.filter;})) return;
    var gopen=isGroupOpen(key,g);
    out.push({_grp:true,group:g,name:g,no:'',color:clr,depth:-1,open:gopen,leaf:false,children:[]});
    if(!gopen) return;
    (function walk(list){ list.forEach(function(r){
      if(!passFilterTree(r)) return;
      out.push(r);
      if(r.children.length && isOpen(key,r)) walk(r.children);
    }); })(roots);
  });
  return out;
}
function isGroupOpen(key,g){ return S.collapsed[key+'|grp|'+g]!==true; }
function toggleGroup(key,g){ var k=key+'|grp|'+g; S.collapsed[k]=(S.collapsed[k]===true)?false:true; render(); }
function passFilterTree(r){ if(S.filter==='all') return true;
  if(r.leaf) return statusOf(r)===S.filter;
  return r.children.some(passFilterTree); }
function SHEETKEYS_cur(){ return SHEETKEYS[S.view]||'mover'; }
function capSheet(key){ return key.charAt(0).toUpperCase()+key.slice(1); }

function toggle(key,g,no){ var k=key+'|'+g+'|'+no; S.collapsed[k]=!(S.collapsed[k]===true)?true:false; render(); }

  var byGroup={},order=[];

      if(r.children.length){
        var open=detOpen(key,r);
        h+='<div class="drow parent" style="padding-left:'+pad+'px" onclick="toggleDet(\''+key+'\',\''+r.group+'\',\''+r.no+'\')">'+
           '<span class="caret '+(open?'open':'')+'">▶</span><b>'+esc(r.name)+'</b><span class="dno">'+r.no+'</span></div>';
        if(open) walk(r.children);
      } else {
        var subs=detailsFor(sheet,r.group,r.no);
        h+='<div class="drow leaf" style="padding-left:'+pad+'px"><span class="leafname">'+esc(r.name)+'</span>'+
           (subs.length?'<span class="dchip">'+subs.length+'</span>':'')+
           (ro?'':'<button class="btn ghost mini addsub" onclick="addDetailFor(\''+sheet+'\',\''+r.group+'\',\''+r.no+'\')">＋ รายการย่อย '+esc(r.name)+'</button>')+'</div>';
        if(subs.length){
          h+='<div class="subitems" style="margin-left:'+(pad+20)+'px"><div style="overflow-x:auto"><table class="dtbl">'+
             detailHead()+'<tbody>'+subs.map(function(d){return detailRow(d,ro);}).join('')+'</tbody></table></div></div>';
        }
      }
    }); })(roots);
  });
  h+='</div>';
  document.getElementById('main').innerHTML='<div style="display:flex;flex-direction:column;height:100%">'+tb+'<div style="overflow:auto;flex:1">'+h+'</div></div>';

function afterDetailChange(){ if(editCtx) renderDetailBox(); else if(S.view==='Details') renderDetails(); }
function dtd(d,f,kind,ro){ var v=d[f]; if(v==null)v=''; return '<td><input '+(ro?'disabled':'')+(kind==='num'?' type="number" inputmode="numeric"':'')+((f==='item'||f==='remark')?' class="rmk"':'')+' value="'+esc(v)+'" onchange="saveDetail(\''+d.id+'\',\''+f+'\',this)"></td>'; }
async function saveDetail(id,f,el){ var v=(el&&el.value!==undefined)?el.value:el;

/* ====================== ATTACHMENTS (รูป/ไฟล์) ====================== */
function jsq(s){ return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function attachmentsFor(refType,refKey){ return (S.attach||[]).filter(function(a){return a.refType===refType&&String(a.refKey)===String(refKey);}); }
function attCell(refType,refKey,title){ var n=attachmentsFor(refType,refKey).length;
  if(!n && !canEdit()) return '<td></td>';
  var hasImg=attachmentsFor(refType,refKey).some(function(a){return /^image\//.test(a.mime||'');});
  return '<td style="text-align:center"><button class="attbtn'+(n?' has':'')+'" title="รูป/ไฟล์แนบ" onclick="openGallery(\''+refType+'\',\''+jsq(refKey)+'\',\''+jsq(title)+'\')">'+(hasImg?'📷':'📎')+(n?'<span class="attn">'+n+'</span>':'')+'</button></td>'; }

function openGallery(refType,refKey,title){
  S.galOpen=true; S.galCtx={refType:refType,refKey:refKey,title:title};
  var list=attachmentsFor(refType,refKey); var ro=!canEdit();
  var body='';
  if(!ro){ body+='<div class="attadd">'+
     '<button class="btn primary mini" onclick="pickFile(\''+jsq(refType)+'\',\''+jsq(refKey)+'\',true)">📷 ถ่ายรูป</button>'+
     '<button class="btn ghost mini" onclick="pickFile(\''+jsq(refType)+'\',\''+jsq(refKey)+'\',false)">📎 แนบไฟล์</button>'+
     '<span class="muted" style="font-size:10px;align-self:center">อัปโหลดขึ้น Google Drive</span></div>'; }
  if(!list.length){ body+='<div class="muted" style="text-align:center;padding:22px">ยังไม่มีรูป/ไฟล์แนบ</div>'; }
  else { body+='<div class="attgrid">'+list.map(function(a){
      var meta='<div class="attmeta"><span class="nm" title="'+esc(a.name)+'">'+esc(a.name)+'</span>'+(ro?'':'<button class="act del" title="ลบ" onclick="delAtt(\''+a.id+'\')">🗑</button>')+'</div>';
      if(/^image\//.test(a.mime||'')) return '<div class="attcard"><a href="'+esc(a.url)+'" target="_blank" rel="noopener"><img src="'+esc(a.thumbUrl||a.url)+'" loading="lazy"></a>'+meta+'</div>';
      return '<div class="attcard file"><a href="'+esc(a.url)+'" target="_blank" rel="noopener" class="filelink">📄</a>'+meta+'</div>';
    }).join('')+'</div>'; }
  document.getElementById('modal').innerHTML=
    '<div class="modal-h"><b>รูป/ไฟล์แนบ</b><small>'+esc(title||'')+'</small></div>'+
    '<div class="modal-b">'+body+'</div>'+
    '<div class="modal-f"><div style="flex:1"></div><button class="btn ghost" onclick="closeModal()">ปิด</button></div>';
  document.getElementById('scrim').classList.add('show');
}
function pickFile(refType,refKey,camera){
  var inp=document.createElement('input'); inp.type='file';
  if(camera){ inp.accept='image/*'; inp.setAttribute('capture','environment'); }
  inp.onchange=function(){ var f=inp.files&&inp.files[0]; if(f) uploadFile(refType,refKey,f); };
  inp.click();
}
function uploadFile(refType,refKey,f){
  if(f.size>12*1024*1024){ toast('ไฟล์ใหญ่เกิน 12MB'); return; }
  var rd=new FileReader();
  rd.onload=function(){ var b64=String(rd.result).split(',')[1];
    commit(server('addAttachment',[refType,refKey,f.name,f.type||'application/octet-stream',b64]))
      .then(function(res){ S.attach=S.attach||[]; S.attach.push(res); afterAttachChange(); })
      .catch(function(e){ toast('อัปโหลดไม่สำเร็จ: '+((e&&e.message)||e)); });
  };
  rd.readAsDataURL(f);
}
async function delAtt(id){ if(!confirm('ลบไฟล์นี้?')) return;
  try{ await server('deleteAttachment',[id]); S.attach=(S.attach||[]).filter(function(a){return a.id!==id;}); afterAttachChange(); }
  catch(e){ toast('ลบไม่สำเร็จ: '+((e&&e.message)||e)); } }
function afterAttachChange(){
  if(S.view==='Details') renderDetails(); else if(S.view==='Equipment') renderEquipment();
  if(editCtx) renderDetailBox();
  if(S.galOpen && S.galCtx) openGallery(S.galCtx.refType, S.galCtx.refKey, S.galCtx.title);
}

  }

function closeModal(){ document.getElementById('scrim').classList.remove('show'); editCtx=null; S.galOpen=false; S.galCtx=null; }
function clearDates(){ document.querySelectorAll('#modal .efld[data-kind="date"]').forEach(function(i){ i.value=''; }); }
function curVal(t,inp){ var h=inp.dataset.header, kind=inp.dataset.kind;
  if(kind==='date') return (t[inp.dataset.key]||'').slice(0,10);
  if(h==='Remark') return t.rm||'';
  return (t.eq&&t.eq[h]!=null&&t.eq[h]!=='')?String(t.eq[h]):''; }
function applyLocal(key,g,no,header,kind,val){
  var map={'Plan Start':'ps','Plan Finish':'pf','Act Start':'as','Act Finish':'af'};
  (S.raw[key]||[]).forEach(function(r){ if(r.group===g&&r.no===no){
    if(map[header]) r[map[header]]=val; else if(header==='Remark') r.rm=val;
    else { r.eq=r.eq||{}; r.eq[header]=(val===''?'':(isNaN(+val)?val:+val)); } } });
}
async function saveDates(ev){
  if(!editCtx) return; var c=editCtx; var btn=ev.target; btn.textContent='กำลังบันทึก…'; btn.disabled=true;

    var inputs=document.querySelectorAll('#modal .efld'); var t=findTask(c.key,c.g,c.no);
    for(var i=0;i<inputs.length;i++){ var inp=inputs[i]; if(inp.disabled) continue; var v=inp.value||''; var old=curVal(t,inp);
      if(String(v)!==String(old)){ await commit(server('updateField',[c.sheet,c.g,c.no,inp.dataset.header,v]), inp);
        applyLocal(c.key,c.g,c.no,inp.dataset.header,inp.dataset.kind,v); } }

/* ====================== misc ====================== */
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function hexA(h,a){ h=String(h).replace('#',''); var r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16); return 'rgba('+r+','+g+','+b+','+a+')'; }
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
var toastT;
function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(function(){t.classList.remove('show');},2600); }
/* ---- auto-save status indicator ---- */
var statT;
function setSaving(){ var e=document.getElementById('saveStat'); if(!e)return; clearTimeout(statT); e.className='savestat on saving'; e.innerHTML='⟳ กำลังบันทึก…'; }
function setSaved(){ var e=document.getElementById('saveStat'); if(!e)return; clearTimeout(statT); e.className='savestat on saved'; e.innerHTML='✓ บันทึกลงชีตแล้ว'; statT=setTimeout(function(){ e.className='savestat'; },2200); }
function setSaveErr(m){ var e=document.getElementById('saveStat'); if(!e)return; clearTimeout(statT); e.className='savestat on err'; e.innerHTML='⚠ บันทึกไม่สำเร็จ'; statT=setTimeout(function(){ e.className='savestat'; },4000); toast('บันทึกไม่สำเร็จ: '+m); }
function commit(p, el){ setSaving(); if(el&&el.classList){ el.classList.remove('cell-saved','cell-error'); el.classList.add('cell-saving'); }
  return p.then(function(r){ setSaved(); setConn('online'); if(el&&el.classList){ el.classList.remove('cell-saving'); el.classList.add('cell-saved'); setTimeout(function(){ el.classList.remove('cell-saved'); },1300); } return r; })
   .catch(function(e){ setSaveErr((e&&e.message)||e); if(el&&el.classList){ el.classList.remove('cell-saving'); el.classList.add('cell-error'); setTimeout(function(){ el.classList.remove('cell-error'); },2200); } throw e; }); }
/* ---- connection status ---- */
function connChannel(){ return ONLINE?'Apps Script':(API_URL?'API URL':'Local'); }
function setConn(state){ var e=document.getElementById('connStat'); if(!e) return; S.conn=state; var ch=connChannel();
  if(state==='online'){ e.className='connstat online'; e.innerHTML='<span class="dot"></span><span class="txt">เชื่อมต่อแล้ว · '+ch+'</span>'; e.title='เชื่อมต่อ Google Sheet แล้ว ('+ch+')'; }
  else if(state==='connecting'){ e.className='connstat connecting'; e.innerHTML='<span class="dot"></span><span class="txt">กำลังเชื่อมต่อ…</span>'; e.title='กำลังเชื่อมต่อเซิร์ฟเวอร์'; }
  else { e.className='connstat offline'; e.innerHTML='<span class="dot"></span><span class="txt">ออฟไลน์ (พรีวิว) · แตะลองใหม่</span>'; e.title='เชื่อมต่อไม่ได้ — แตะเพื่อลองเชื่อมต่อใหม่'; }
}
async function retryConn(){ if(S.conn==='online') return; setConn('connecting');
  try{ await reload(); setConn('online'); toast('เชื่อมต่อสำเร็จ'); }catch(e){ setConn('offline'); toast('ยังเชื่อมต่อไม่ได้'); } }

function render(){ if(S.view==='dashboard') renderDashboard(); else if(S.view==='Equipment') renderEquipment(); else if(S.view==='Details') renderDetails(); else renderGantt(S.view); }
function isAdmin(){ return S.user && S.user.role==='Admin'; }
function colorOf(sheet,g){ var gm=GROUPMETA[capSheet(SHEETKEYS[sheet]||sheet.toLowerCase())]; return (gm&&gm[g])||'#4f8fff'; }
function detailsFor(sheet,g,no){ return (S.details||[]).filter(function(d){return d.sheet===sheet&&d.group===g&&d.no===no;}); }
async function reload(){ var d=await server('getAllData',[]);

  document.getElementById('modal').innerHTML=
    '<div class="modal-h"><b>เพิ่มรายการ</b><small>'+sheet+' · '+esc(g)+(parentNo?(' · ใต้ No '+parentNo):' · งานหลัก (root)')+'</small></div>'+
    '<div class="modal-b"><div class="field"><label>ชื่อรายการ</label><input id="addName" placeholder="เช่น Built-in, Power Zone…"></div>'+
    '<div class="muted" style="margin-top:8px;font-size:11px">ระบบจะตั้งเลข No และแทรกแถวต่อท้ายให้อัตโนมัติ</div></div>'+
    '<div class="modal-f"><div style="flex:1"></div><button class="btn ghost" onclick="closeModal()">ยกเลิก</button>'+
    '<button class="btn primary" data-g="'+esc(g)+'" onclick="doAdd(\''+sheet+'\',this.dataset.g,\''+parentNo+'\',event)">เพิ่ม</button></div>';
  document.getElementById('scrim').classList.add('show');
  setTimeout(function(){var i=document.getElementById('addName'); if(i)i.focus();},60);
}
async function doAdd(sheet,g,parentNo,ev){
  var name=(document.getElementById('addName').value||'').trim(); if(!name){toast('ใส่ชื่อรายการก่อน');return;}
  var btn=ev.target; btn.disabled=true; btn.textContent='กำลังเพิ่ม…';
  try{ await server('addTask',[sheet,g,parentNo||'',name]); toast('เพิ่มแล้ว ✓'); closeModal(); await reload(); }
  catch(e){ toast('ผิดพลาด: '+(e.message||e)); btn.disabled=false; btn.textContent='เพิ่ม'; }
}
function openRename(sheet,g,no){
  var t=findTask(SHEETKEYS[sheet],g,no); if(!t) return;
  document.getElementById('modal').innerHTML=
    '<div class="modal-h"><b>แก้ชื่อรายการ</b><small>'+sheet+' · No '+no+'</small></div>'+
    '<div class="modal-b"><div class="field"><label>ชื่อรายการ</label><input id="renName" value="'+esc(t.name)+'"></div></div>'+
    '<div class="modal-f"><div style="flex:1"></div><button class="btn ghost" onclick="closeModal()">ยกเลิก</button>'+
    '<button class="btn primary" data-g="'+esc(g)+'" onclick="doRename(\''+sheet+'\',this.dataset.g,\''+no+'\',event)">บันทึก</button></div>';
  document.getElementById('scrim').classList.add('show');
}
async function doRename(sheet,g,no,ev){
  var name=(document.getElementById('renName').value||'').trim(); if(!name){toast('ใส่ชื่อ');return;}
  var btn=ev.target; btn.disabled=true;
  try{ await server('editTaskName',[sheet,g,no,name]); toast('บันทึกแล้ว ✓'); closeModal(); await reload(); }
  catch(e){ toast('ผิดพลาด: '+(e.message||e)); btn.disabled=false; }
}
async function doDelete(sheet,g,no){
  var t=findTask(SHEETKEYS[sheet],g,no);
  if(!confirm('ลบ "'+(t?t.name:no)+'" และรายการย่อยทั้งหมด?\\nการลบนี้ถาวร')) return;
  try{ await server('deleteTask',[sheet,g,no]); toast('ลบแล้ว'); await reload(); }
  catch(e){ toast('ผิดพลาด: '+(e.message||e)); }
}
function progress(list){ if(!list.length) return 0; var s=0; list.forEach(function(t){var st=statusOf(t); s+= st==='Complete'?1:(st==='In Progress'?0.5:0);}); return Math.round(s/list.length*100); }
function eqv(r,k){ var v=r.eq?r.eq[k]:''; return (v===0||v)?v:''; }
function summaryStrip(list){
  var p=progress(list);
  var c=[['Complete',cnt(list,'Complete'),'var(--green)'],['In Progress',cnt(list,'In Progress'),'var(--blue)'],
         ['Delayed',cnt(list,'Delayed'),'var(--red)'],['Not Started',cnt(list,'Not Started'),'var(--grey)']];
  return '<div class="strip"><div class="scard prog"><div class="lab">Overall Progress</div>'+
    '<div style="display:flex;align-items:center;gap:10px;margin-top:4px"><div class="num" style="color:var(--acc)">'+p+'%</div>'+
    '<div class="hb" style="flex:1"><div class="hbf" style="width:'+p+'%"></div></div></div></div>'+
    c.map(function(x){return '<div class="scard"><div class="lab">'+x[0]+'</div><div class="num" style="color:'+x[2]+'">'+x[1]+'</div></div>';}).join('')+'</div>';
}

function applyUser(){
  var u=S.user||{role:'Viewer'}; var authed=!!S.token;
  document.getElementById('uName').textContent=u.name||u.username||'Guest';
  document.getElementById('uRole').textContent=u.role||'Viewer';
  document.getElementById('uAv').textContent=((u.name||u.username||'?')[0]||'G').toUpperCase();
  document.getElementById('loginBtn').style.display=authed?'none':'';
  document.getElementById('logoutBtn').style.display=authed?'':'none';
  document.getElementById('usersBtn').style.display=(authed&&u.role==='Admin')?'':'none';
  var dd=document.getElementById('dataDate'); if(dd) dd.disabled=!canEdit();
}
async function setDD(v){ if(!canEdit()){toast('ต้องเข้าสู่ระบบ (Editor ขึ้นไป)');document.getElementById('dataDate').value=(S.settings.DataDate||'').slice(0,10);return;}
  S.settings.DataDate=v; render(); try{ await commit(server('setDataDate',[v]), document.getElementById('dataDate')); }catch(e){} }

/* ---------- login / logout ---------- */
function openLogin(){
  document.getElementById('modal').innerHTML=
    '<div class="modal-h"><b>เข้าสู่ระบบ</b><small>ใช้ชื่อผู้ใช้ + รหัสผ่านที่กำหนดในชีต User</small></div>'+
    '<div class="modal-b"><div class="field"><label>ชื่อผู้ใช้ (Username)</label><input id="liUser" autocomplete="username" placeholder="เช่น admin"></div>'+
    '<div class="field" style="margin-top:12px"><label>รหัสผ่าน</label><input id="liPass" type="password" autocomplete="current-password" onkeydown="if(event.key===\'Enter\')doLogin(event)"></div>'+
    '<div id="liErr" class="rollnote" style="display:none;color:var(--red);background:rgba(244,79,108,.1);border-color:rgba(244,79,108,.3);margin-top:10px"></div></div>'+
    '<div class="modal-f"><div style="flex:1"></div><button class="btn ghost" onclick="closeModal()">ยกเลิก</button>'+
    '<button class="btn primary" onclick="doLogin(event)">เข้าสู่ระบบ</button></div>';
  document.getElementById('scrim').classList.add('show');
  setTimeout(function(){var i=document.getElementById('liUser'); if(i)i.focus();},60);
}
async function doLogin(ev){
  var user=(document.getElementById('liUser').value||'').trim();
  var pass=document.getElementById('liPass').value||'';
  if(!user||!pass){ liError('กรอกชื่อผู้ใช้และรหัสผ่าน'); return; }
  var btn=ev.target; if(btn&&btn.tagName==='BUTTON'){btn.disabled=true;btn.textContent='กำลังตรวจสอบ…';}
  try{ var res=await server('login',[user,pass]);
    S.token=res.token; S.user=res.user; try{localStorage.setItem('ah-token',S.token);}catch(e){}
    closeModal(); toast('ยินดีต้อนรับ '+(res.user.name||res.user.username)); await reload(); applyUser();
  }catch(e){ liError(e.message||String(e)); if(btn){btn.disabled=false;btn.textContent='เข้าสู่ระบบ';} }
}
function liError(m){ var e=document.getElementById('liErr'); if(e){e.style.display='';e.textContent=m;} else toast(m); }
async function doLogout(){
  try{ await server('logout',[]); }catch(e){}
  S.token=''; try{localStorage.removeItem('ah-token');}catch(e){}
  S.user={email:'',name:'ผู้เยี่ยมชม (Guest)',role:'Viewer'};
  toast('ออกจากระบบแล้ว'); await reload(); applyUser();
}

/* ---------- user management (Admin) ---------- */
async function openUsers(){
  document.getElementById('modal').innerHTML='<div class="modal-h"><b>จัดการผู้ใช้</b><small>กำหนดสิทธิ์ Admin / Editor / Viewer</small></div>'+
    '<div class="modal-b" id="umBody"><div class="muted">กำลังโหลด…</div></div>'+
    '<div class="modal-f"><div style="flex:1"></div><button class="btn ghost" onclick="closeModal()">ปิด</button></div>';
  document.getElementById('scrim').classList.add('show');
  try{ var list=await server('listUsers',[]); renderUsers(list); }
  catch(e){ document.getElementById('umBody').innerHTML='<div class="rollnote" style="color:var(--red)">'+(e.message||e)+'</div>'; }
}
function renderUsers(list){
  var h='<div style="overflow-x:auto"><table class="dtbl"><thead><tr><th style="text-align:left">Username</th><th style="text-align:left">Name</th><th>Role</th><th>Active</th><th>รหัสผ่าน</th><th></th></tr></thead><tbody>';
  list.forEach(function(u){
    h+='<tr><td class="rmk">'+esc(u.username)+'</td><td class="rmk">'+esc(u.name)+'</td>'+
      '<td><select onchange="umRole(\''+esc(u.username)+'\',this.value)">'+['Admin','Editor','Viewer'].map(function(r){return '<option '+(u.role===r?'selected':'')+'>'+r+'</option>';}).join('')+'</select></td>'+
      '<td><button class="act" onclick="umActive(\''+esc(u.username)+'\','+(String(u.active).toUpperCase()==='N'?'true':'false')+')">'+(String(u.active).toUpperCase()==='N'?'ปิด':'เปิด')+'</button></td>'+
      '<td><button class="act" title="ตั้งรหัสผ่าน" onclick="umPass(\''+esc(u.username)+'\')">🔑</button></td>'+
      '<td><button class="act del" onclick="umDel(\''+esc(u.username)+'\')">🗑</button></td></tr>';
  });
  h+='</tbody></table></div>';
  h+='<div class="modlbl">เพิ่มผู้ใช้</div><div class="dgrid" style="grid-template-columns:1fr 1fr">'+
     '<div class="field"><label>Username</label><input id="nuUser"></div>'+
     '<div class="field"><label>Name</label><input id="nuName"></div>'+
     '<div class="field"><label>Role</label><select id="nuRole"><option>Viewer</option><option>Editor</option><option>Admin</option></select></div>'+
     '<div class="field"><label>รหัสผ่าน</label><input id="nuPass" type="text"></div></div>'+
     '<button class="btn primary mini" style="margin-top:10px" onclick="umAdd()">＋ เพิ่มผู้ใช้</button>';
  document.getElementById('umBody').innerHTML=h;
}
async function umRefresh(){ try{ renderUsers(await server('listUsers',[])); }catch(e){ toast('โหลดผู้ใช้ไม่ได้'); } }
async function umRole(username,role){ try{ await server('updateUserRole',[username,role]); toast('อัปเดต Role แล้ว'); }catch(e){ toast(e.message||e); umRefresh(); } }
async function umActive(username,act){ try{ await server('setActive',[username,act]); umRefresh(); }catch(e){ toast(e.message||e); } }
async function umDel(username){ if(!confirm('ลบผู้ใช้ '+username+'?')) return; try{ await server('deleteUser',[username]); toast('ลบแล้ว'); umRefresh(); }catch(e){ toast(e.message||e); } }
async function umPass(username){ var p=prompt('ตั้งรหัสผ่านใหม่สำหรับ '+username); if(!p) return; try{ await server('setPassword',[username,p]); toast('ตั้งรหัสผ่านแล้ว'); }catch(e){ toast(e.message||e); } }
async function umAdd(){ var username=(document.getElementById('nuUser').value||'').trim(); var name=(document.getElementById('nuName').value||'').trim();
  var role=document.getElementById('nuRole').value; var pass=document.getElementById('nuPass').value||'';
  if(!username){ toast('ใส่ชื่อผู้ใช้'); return; }
  try{ await server('addUser',[username,name,role,pass]); toast('เพิ่มผู้ใช้แล้ว'); umRefresh(); }catch(e){ toast(e.message||e); } }

/* theme */
function toggleTheme(){ S.theme=S.theme==='dark'?'light':'dark'; document.body.classList.toggle('light',S.theme==='light');
  document.getElementById('themeBtn').textContent=S.theme==='light'?'☀️':'🌙'; try{localStorage.setItem('ah-theme',S.theme);}catch(e){} }

/* responsive col width */
function fitCols(){ var w=innerWidth; var col,tw,rowh;
  if(w<=560){col=22;tw=150;rowh=40;} else if(w<=820){col=24;tw=220;rowh=38;}
  else if(w>=2400){col=38;tw=480;rowh=36;} else if(w>=1500){col=32;tw=420;rowh=36;} else {col=28;tw=340;rowh=36;}
  var r=document.documentElement.style; r.setProperty('--col',col+'px'); r.setProperty('--tw',tw+'px'); r.setProperty('--rowh',rowh+'px');
}
var rt; addEventListener('resize',function(){ clearTimeout(rt); rt=setTimeout(function(){ fitCols(); if(S.view!=='dashboard') render(); },150); });

/* ====================== INIT ====================== */
async function init(){
  try{ if(localStorage.getItem('ah-theme')==='light'){S.theme='light';document.body.classList.add('light');document.getElementById('themeBtn').textContent='☀️';} }catch(e){}
  try{ S.token=localStorage.getItem('ah-token')||''; }catch(e){ S.token=''; }
  fitCols(); setConn('connecting');
  var d, connOk=true;
  try{ d=await server('getAllData',[]); }
  catch(e){ connOk=false; d=(typeof FALLBACK!=='undefined')?FALLBACK:{}; toast('เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ — แสดงโหมดพรีวิว'); }
  setConn(connOk?'online':'offline');
  S.raw={ mover:d.mover||[], renovation:d.renovation||[], reinstate:d.reinstate||[] };
  S.details=d.details||[]; S.attach=d.attachments||[];
  S.settings=d.settings||{}; S.user=d.user||{role:'Viewer'};
  buildWeeks();
  if(S.token && (!S.user.username)){ S.token=''; try{localStorage.removeItem('ah-token');}catch(e){} } // stale/expired token
  if(d.groupMeta) GROUPMETA=d.groupMeta;
  document.getElementById('projName').textContent=S.settings.ProjectName||'Gantt Chart Project Horizon';
  document.getElementById('dataDate').value=(S.settings.DataDate||'2025-09-15').slice(0,10);
  applyUser();
  document.getElementById('dataDate').addEventListener('change',function(e){ setDD(e.target.value); });
  document.getElementById('themeBtn').addEventListener('click',toggleTheme);
  document.getElementById('scrim').addEventListener('click',function(e){ if(e.target.id==='scrim') closeModal(); });
  renderNav(); render();
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='flex';
}
init();
</script>
