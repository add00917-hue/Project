<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบประกาศสื่อสาร</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:   #0b1e3d;
    --navy2:  #112244;
    --navy3:  #163060;
    --gold:   #c8a84b;
    --gold2:  #e8c86a;
    --gold3:  #f5e199;
    --white:  #f4f1ea;
    --cream:  #ede8dc;
    --muted:  #8a9bb5;
    --border: rgba(200,168,75,0.25);
    --border2: rgba(200,168,75,0.12);
    --pane-gap: 4px;
    --topbar-h: 60px;
    --statusbar-h: 28px;
    --shadow: 0 4px 24px rgba(0,0,0,0.45);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--navy);
    color: var(--white);
    font-family: 'Sarabun', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background-image:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(17,34,68,0.9) 0%, transparent 70%),
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 39px,
        rgba(200,168,75,0.03) 39px,
        rgba(200,168,75,0.03) 40px
      ),
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 39px,
        rgba(200,168,75,0.03) 39px,
        rgba(200,168,75,0.03) 40px
      );
  }

  /* ═══ TOPBAR ═══════════════════════════════════════════ */
  .topbar {
    height: var(--topbar-h);
    background: linear-gradient(90deg, #0b1e3d 0%, #122550 50%, #0b1e3d 100%);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 0;
    flex-shrink: 0;
    position: relative;
    box-shadow: 0 2px 16px rgba(0,0,0,0.5);
  }

  /* gold line top */
  .topbar::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), var(--gold2), var(--gold), transparent);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    flex-shrink: 0;
  }

  .brand-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 10px rgba(200,168,75,0.4);
    flex-shrink: 0;
  }
  .brand-icon svg { width: 20px; height: 20px; }

  .brand-text { display: flex; flex-direction: column; gap: 0; line-height: 1.15; }
  .brand-th {
    font-family: 'Kanit', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--white);
    letter-spacing: 0.02em;
  }
  .brand-sub {
    font-size: 10px;
    color: var(--gold);
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .topbar-div {
    width: 1px;
    height: 32px;
    background: var(--border);
    margin: 0 18px;
    flex-shrink: 0;
  }

  .section-label {
    font-size: 11px;
    color: var(--muted);
    font-weight: 400;
    letter-spacing: 0.04em;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* Layout buttons */
  .layout-group {
    display: flex;
    gap: 3px;
    align-items: center;
    flex-shrink: 0;
  }

  .layout-btn {
    width: 38px;
    height: 30px;
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.18s ease;
    padding: 5px;
    position: relative;
  }
  .layout-btn:hover {
    border-color: rgba(200,168,75,0.5);
    background: rgba(200,168,75,0.07);
  }
  .layout-btn.active {
    border-color: var(--gold);
    background: rgba(200,168,75,0.15);
    box-shadow: 0 0 0 1px rgba(200,168,75,0.2), inset 0 1px 0 rgba(200,168,75,0.1);
  }
  .layout-btn svg { width: 24px; height: 17px; }
  .layout-btn svg rect { fill: none; stroke: var(--muted); stroke-width: 1.4; }
  .layout-btn:hover svg rect { stroke: var(--white); }
  .layout-btn.active svg rect { stroke: var(--gold); }

  .layout-btn .layout-tip {
    display: none;
    position: absolute;
    bottom: -28px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(11,30,61,0.95);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 8px;
    font-size: 10px;
    color: var(--white);
    white-space: nowrap;
    z-index: 200;
  }
  .layout-btn:hover .layout-tip { display: block; }

  .topbar-spacer { flex: 1; }

  /* Action Buttons */
  .btn-action {
    height: 32px;
    padding: 0 16px;
    border-radius: 5px;
    font-size: 12.5px;
    font-family: 'Sarabun', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
    border: none;
    color: var(--navy);
    box-shadow: 0 2px 10px rgba(200,168,75,0.35);
  }
  .btn-primary:hover {
    background: linear-gradient(135deg, var(--gold2) 0%, var(--gold3) 100%);
    box-shadow: 0 4px 16px rgba(200,168,75,0.5);
    transform: translateY(-1px);
  }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .btn-ghost:hover { border-color: #c0474760; color: #e07070; }

  /* ═══ VIEWER ═══════════════════════════════════════════ */
  .viewer {
    flex: 1;
    display: grid;
    gap: var(--pane-gap);
    padding: var(--pane-gap);
    overflow: hidden;
    transition: grid-template-columns 0.28s cubic-bezier(.4,0,.2,1),
                grid-template-rows    0.28s cubic-bezier(.4,0,.2,1);
  }

  /* ═══ PANE ═══════════════════════════════════════════ */
  .pane {
    background: var(--navy2);
    border: 1px solid rgba(200,168,75,0.15);
    border-radius: 8px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.18s;
  }
  .pane:hover { border-color: rgba(200,168,75,0.3); }
  .pane.drag-over {
    border-color: var(--gold) !important;
    background: rgba(200,168,75,0.06);
    box-shadow: inset 0 0 0 2px rgba(200,168,75,0.25);
  }

  /* Empty */
  .pane-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    pointer-events: none;
  }
  .pane.has-image .pane-empty { display: none; }

  .pane-empty-ring {
    width: 56px;
    height: 56px;
    border: 2px dashed rgba(200,168,75,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pane-empty-ring svg { width: 24px; height: 24px; opacity: 0.3; }

  .pane-empty-text {
    font-size: 12px;
    color: rgba(138,155,181,0.6);
    text-align: center;
    line-height: 1.7;
    font-weight: 300;
  }

  .pane-num {
    font-size: 10px;
    color: rgba(200,168,75,0.2);
    font-weight: 400;
    letter-spacing: 0.06em;
  }

  /* Image */
  .pane-img {
    display: none;
    width: 100%;
    height: 100%;
    object-fit: contain;
    position: absolute;
    inset: 0;
    transition: object-fit 0.2s;
  }
  .pane.has-image .pane-img { display: block; }

  /* Pane overlay toolbar */
  .pane-toolbar {
    position: absolute;
    top: 8px;
    right: 8px;
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.18s;
    z-index: 10;
  }
  .pane:hover .pane-toolbar { opacity: 1; }

  .pane-btn {
    width: 28px;
    height: 28px;
    border-radius: 5px;
    background: rgba(11,30,61,0.85);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(200,168,75,0.25);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.14s;
    color: var(--muted);
  }
  .pane-btn:hover { background: rgba(200,168,75,0.18); border-color: var(--gold); color: var(--gold2); }
  .pane-btn.danger:hover { background: rgba(200,70,70,0.2); border-color: #e07070; color: #e07070; }
  .pane-btn svg { width: 13px; height: 13px; }

  /* Pane label */
  .pane-label {
    position: absolute;
    bottom: 7px;
    left: 10px;
    font-size: 10px;
    color: rgba(200,168,75,0.2);
    letter-spacing: 0.05em;
    pointer-events: none;
    font-weight: 400;
  }
  .pane:hover .pane-label { color: rgba(200,168,75,0.4); }

  /* Fit badge */
  .pane-fit-badge {
    position: absolute;
    bottom: 7px;
    right: 8px;
    font-size: 9px;
    color: rgba(200,168,75,0.2);
    border: 1px solid rgba(200,168,75,0.1);
    border-radius: 3px;
    padding: 1px 5px;
    opacity: 0;
    transition: opacity 0.15s;
    cursor: pointer;
    background: rgba(11,30,61,0.7);
    backdrop-filter: blur(6px);
  }
  .pane:hover .pane-fit-badge { opacity: 1; color: rgba(200,168,75,0.5); }
  .pane-fit-badge:hover { color: var(--gold) !important; border-color: rgba(200,168,75,0.4) !important; }

  /* Click zone */
  .pane-click-zone {
    position: absolute;
    inset: 0;
    cursor: pointer;
    z-index: 2;
  }
  .pane.has-image .pane-click-zone { display: none; }

  /* ═══ LIGHTBOX ═══════════════════════════════════════════ */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5,12,26,0.95);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    animation: lbFadeIn 0.18s ease;
    backdrop-filter: blur(4px);
  }
  .lightbox.open { display: flex; }

  .lightbox-inner {
    position: relative;
    max-width: 94vw;
    max-height: 92vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .lightbox-img {
    max-width: 100%;
    max-height: 88vh;
    object-fit: contain;
    border-radius: 6px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.8), 0 0 0 1px rgba(200,168,75,0.15);
    animation: lbScaleIn 0.2s cubic-bezier(.4,0,.2,1);
  }

  .lightbox-close {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 38px;
    height: 38px;
    background: rgba(11,30,61,0.9);
    border: 1px solid var(--border);
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 16px;
    transition: all 0.15s;
  }
  .lightbox-close:hover { background: rgba(200,70,70,0.3); border-color: #e07070; color: #e07070; }

  @keyframes lbFadeIn  { from { opacity:0 } to { opacity:1 } }
  @keyframes lbScaleIn { from { opacity:0; transform: scale(.94) } to { opacity:1; transform: scale(1) } }

  /* ═══ STATUS BAR ═══════════════════════════════════════════ */
  .statusbar {
    height: var(--statusbar-h);
    background: linear-gradient(90deg, #091a36 0%, #0e2248 50%, #091a36 100%);
    border-top: 1px solid var(--border2);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 20px;
    flex-shrink: 0;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold);
    flex-shrink: 0;
    box-shadow: 0 0 6px rgba(200,168,75,0.5);
  }

  .status-item {
    font-size: 10.5px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .status-item strong { color: var(--gold); font-weight: 500; }

  .status-spacer { flex: 1; }

  .status-hint {
    font-size: 10px;
    color: rgba(138,155,181,0.4);
    white-space: nowrap;
  }

  /* ═══ HIDDEN INPUTS ═══════════════════════════════════════════ */
  #fileInput, #fileInputAll { display: none; }
</style>
</head>
<body>

<input type="file" id="fileInput" accept="image/*">
<input type="file" id="fileInputAll" accept="image/*" multiple>

<!-- ═════ TOP BAR ═════ -->
<div class="topbar">

  <!-- Brand -->
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="4" width="16" height="12" rx="2" stroke="#0b1e3d" stroke-width="1.5"/>
        <path d="M2 7h16" stroke="#0b1e3d" stroke-width="1.5"/>
        <circle cx="5" cy="5.5" r="0.8" fill="#0b1e3d"/>
        <circle cx="7.5" cy="5.5" r="0.8" fill="#0b1e3d"/>
        <circle cx="10" cy="5.5" r="0.8" fill="#0b1e3d"/>
        <rect x="5" y="10" width="10" height="1.2" rx="0.6" fill="#0b1e3d"/>
        <rect x="5" y="12.5" width="6" height="1.2" rx="0.6" fill="#0b1e3d"/>
      </svg>
    </div>
    <div class="brand-text">
      <span class="brand-th">ระบบประกาศสื่อสาร</span>
      <span class="brand-sub">Announcement Display System</span>
    </div>
  </div>

  <div class="topbar-div"></div>
  <div class="section-label">รูปแบบการแสดง</div>
  <div style="width:10px;flex-shrink:0"></div>

  <!-- Layout Presets -->
  <div class="layout-group" id="layoutGroup">

    <button class="layout-btn active" data-layout="1" title="">
      <svg viewBox="0 0 24 17"><rect x="1" y="1" width="22" height="15" rx="1.5"/></svg>
      <span class="layout-tip">1 ภาพ เต็มจอ</span>
    </button>

    <button class="layout-btn" data-layout="2h">
      <svg viewBox="0 0 24 17"><rect x="1" y="1" width="10.5" height="15" rx="1.5"/><rect x="12.5" y="1" width="10.5" height="15" rx="1.5"/></svg>
      <span class="layout-tip">2 ภาพ แนวนอน</span>
    </button>

    <button class="layout-btn" data-layout="2v">
      <svg viewBox="0 0 24 17"><rect x="1" y="1" width="22" height="7" rx="1.5"/><rect x="1" y="9" width="22" height="7" rx="1.5"/></svg>
      <span class="layout-tip">2 ภาพ แนวตั้ง</span>
    </button>

    <button class="layout-btn" data-layout="3l">
      <svg viewBox="0 0 24 17">
        <rect x="1" y="1" width="13" height="15" rx="1.5"/>
        <rect x="15" y="1" width="8" height="7" rx="1.5"/>
        <rect x="15" y="9" width="8" height="7" rx="1.5"/>
      </svg>
      <span class="layout-tip">3 ภาพ ซ้ายใหญ่</span>
    </button>

    <button class="layout-btn" data-layout="3r">
      <svg viewBox="0 0 24 17">
        <rect x="1" y="1" width="8" height="7" rx="1.5"/>
        <rect x="1" y="9" width="8" height="7" rx="1.5"/>
        <rect x="10" y="1" width="13" height="15" rx="1.5"/>
      </svg>
      <span class="layout-tip">3 ภาพ ขวาใหญ่</span>
    </button>

    <button class="layout-btn" data-layout="3t">
      <svg viewBox="0 0 24 17">
        <rect x="1" y="1" width="22" height="8" rx="1.5"/>
        <rect x="1" y="10" width="10.5" height="6" rx="1.5"/>
        <rect x="12.5" y="10" width="10.5" height="6" rx="1.5"/>
      </svg>
      <span class="layout-tip">3 ภาพ บนใหญ่</span>
    </button>

    <button class="layout-btn" data-layout="4">
      <svg viewBox="0 0 24 17">
        <rect x="1" y="1" width="10.5" height="7" rx="1.5"/>
        <rect x="12.5" y="1" width="10.5" height="7" rx="1.5"/>
        <rect x="1" y="9" width="10.5" height="7" rx="1.5"/>
        <rect x="12.5" y="9" width="10.5" height="7" rx="1.5"/>
      </svg>
      <span class="layout-tip">4 ภาพ 2×2</span>
    </button>

    <button class="layout-btn" data-layout="6">
      <svg viewBox="0 0 24 17">
        <rect x="1" y="1" width="6.5" height="7" rx="1"/><rect x="8.7" y="1" width="6.5" height="7" rx="1"/><rect x="16.4" y="1" width="6.5" height="7" rx="1"/>
        <rect x="1" y="9" width="6.5" height="7" rx="1"/><rect x="8.7" y="9" width="6.5" height="7" rx="1"/><rect x="16.4" y="9" width="6.5" height="7" rx="1"/>
      </svg>
      <span class="layout-tip">6 ภาพ 3×2</span>
    </button>

    <button class="layout-btn" data-layout="9">
      <svg viewBox="0 0 24 17">
        <rect x="1" y="1" width="6.5" height="4.5" rx="1"/><rect x="8.7" y="1" width="6.5" height="4.5" rx="1"/><rect x="16.4" y="1" width="6.5" height="4.5" rx="1"/>
        <rect x="1" y="6.5" width="6.5" height="4.5" rx="1"/><rect x="8.7" y="6.5" width="6.5" height="4.5" rx="1"/><rect x="16.4" y="6.5" width="6.5" height="4.5" rx="1"/>
        <rect x="1" y="12" width="6.5" height="4.5" rx="1"/><rect x="8.7" y="12" width="6.5" height="4.5" rx="1"/><rect x="16.4" y="12" width="6.5" height="4.5" rx="1"/>
      </svg>
      <span class="layout-tip">9 ภาพ 3×3</span>
    </button>

  </div>

  <div class="topbar-spacer"></div>

  <button class="btn-action btn-primary" id="btnUploadAll">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M6.5 9V2M3.5 5L6.5 2l3 3"/>
      <path d="M1.5 11h10" stroke-linecap="round"/>
    </svg>
    โหลดหลายภาพ
  </button>
  <div style="width:8px;flex-shrink:0"></div>
  <button class="btn-action btn-ghost" id="btnClearAll">ล้างทั้งหมด</button>
</div>

<!-- ═════ VIEWER ═════ -->
<div class="viewer" id="viewer"></div>

<!-- ═════ STATUS BAR ═════ -->
<div class="statusbar">
  <div class="status-dot"></div>
  <div class="status-item">รูปแบบ: <strong id="statusLayout">1 ภาพ เต็มจอ</strong></div>
  <div class="status-item">โหลดแล้ว: <strong id="statusLoaded">0 ภาพ</strong></div>
  <div class="status-spacer"></div>
  <div class="status-hint">คลิกหรือลากภาพมาวางในช่อง · ดับเบิลคลิกเพื่อขยาย</div>
</div>

<!-- ═════ LIGHTBOX ═════ -->
<div class="lightbox" id="lightbox">
  <div class="lightbox-inner">
    <img class="lightbox-img" id="lightboxImg" src="" alt="">
  </div>
  <div class="lightbox-close" id="lightboxClose">✕</div>
</div>

<script>
const viewer      = document.getElementById('viewer');
const lightbox    = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');
const fileInput   = document.getElementById('fileInput');
const fileInputAll= document.getElementById('fileInputAll');

let currentLayout = '1';
let panes = [];
let pendingIdx = -1;

// ── LAYOUTS ──────────────────────────────
const LAYOUTS = {
  '1':  { cols:'1fr',         rows:'1fr',         count:1, label:'1 ภาพ เต็มจอ' },
  '2h': { cols:'1fr 1fr',     rows:'1fr',         count:2, label:'2 ภาพ แนวนอน' },
  '2v': { cols:'1fr',         rows:'1fr 1fr',     count:2, label:'2 ภาพ แนวตั้ง' },
  '3l': { cols:'2fr 1fr',     rows:'1fr 1fr',     count:3, label:'3 ภาพ ซ้ายใหญ่', special:'3l' },
  '3r': { cols:'1fr 2fr',     rows:'1fr 1fr',     count:3, label:'3 ภาพ ขวาใหญ่', special:'3r' },
  '3t': { cols:'1fr 1fr',     rows:'1.4fr 1fr',   count:3, label:'3 ภาพ บนใหญ่',  special:'3t' },
  '4':  { cols:'1fr 1fr',     rows:'1fr 1fr',     count:4, label:'4 ภาพ 2×2' },
  '6':  { cols:'1fr 1fr 1fr', rows:'1fr 1fr',     count:6, label:'6 ภาพ 3×2' },
  '9':  { cols:'1fr 1fr 1fr', rows:'1fr 1fr 1fr', count:9, label:'9 ภาพ 3×3' },
};

function buildGrid(key) {
  const L = LAYOUTS[key];
  const prevImgs = panes.map(p => p.imgSrc);
  const prevFits = panes.map(p => p.fitMode);

  viewer.style.gridTemplateColumns = L.cols;
  viewer.style.gridTemplateRows    = L.rows;
  viewer.innerHTML = '';
  panes = [];

  for (let i = 0; i < L.count; i++) {
    const p = createPane(i);
    viewer.appendChild(p.el);
    panes.push(p);
  }

  // Special spanning
  if (L.special === '3l') {
    panes[0].el.style.gridRow = '1 / 3';
    panes[0].el.style.gridColumn = '1';
    panes[1].el.style.gridColumn = '2'; panes[1].el.style.gridRow = '1';
    panes[2].el.style.gridColumn = '2'; panes[2].el.style.gridRow = '2';
  } else if (L.special === '3r') {
    panes[0].el.style.gridColumn = '1'; panes[0].el.style.gridRow = '1';
    panes[1].el.style.gridColumn = '1'; panes[1].el.style.gridRow = '2';
    panes[2].el.style.gridRow = '1 / 3'; panes[2].el.style.gridColumn = '2';
  } else if (L.special === '3t') {
    panes[0].el.style.gridColumn = '1 / 3'; panes[0].el.style.gridRow = '1';
    panes[1].el.style.gridColumn = '1'; panes[1].el.style.gridRow = '2';
    panes[2].el.style.gridColumn = '2'; panes[2].el.style.gridRow = '2';
  }

  // Restore
  prevImgs.forEach((src, i) => {
    if (src && i < panes.length) setImage(panes[i], src, prevFits[i] || 'contain');
  });

  updateStatus();
}

function createPane(idx) {
  const el = document.createElement('div');
  el.className = 'pane';
  el.innerHTML = `
    <div class="pane-empty">
      <div class="pane-empty-ring">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="5" width="18" height="14" rx="2"/>
          <circle cx="9" cy="11" r="2"/>
          <path d="M3 17l5-5 4 4 3-3 6 6" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="pane-empty-text">คลิกหรือลากภาพมาวาง<br><span style="font-size:10.5px;color:rgba(138,155,181,0.35)">PNG · JPG · WebP · SVG</span></div>
      <div class="pane-num">ช่องที่ ${idx + 1}</div>
    </div>
    <img class="pane-img" src="" alt="" draggable="false">
    <div class="pane-toolbar">
      <button class="pane-btn btn-zoom" title="ขยายดูเต็มจอ">
        <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M1 4V1.5H3.5M9.5 1.5H12V4M12 9v2.5H9.5M3.5 11.5H1V9"/>
        </svg>
      </button>
      <button class="pane-btn btn-fit" title="สลับ Contain / Cover">
        <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="1.5" y="1.5" width="10" height="10" rx="1"/>
          <rect x="3.5" y="3.5" width="6" height="6" rx="0.5" stroke-dasharray="1.5 1"/>
        </svg>
      </button>
      <button class="pane-btn btn-remove danger" title="ลบภาพ">
        <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.7">
          <path d="M2.5 2.5l8 8M10.5 2.5l-8 8"/>
        </svg>
      </button>
    </div>
    <div class="pane-label">ช่อง ${idx + 1}</div>
    <div class="pane-fit-badge">contain</div>
    <div class="pane-click-zone"></div>
  `;

  const obj = { el, imgSrc: null, fitMode: 'contain' };
  const img  = el.querySelector('.pane-img');
  const badge = el.querySelector('.pane-fit-badge');
  const zone  = el.querySelector('.pane-click-zone');

  // Click to upload
  zone.addEventListener('click', () => {
    pendingIdx = panes.indexOf(obj);
    fileInput.click();
  });

  // Drag & drop
  el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-over'); });
  el.addEventListener('dragleave', e => { if (!el.contains(e.relatedTarget)) el.classList.remove('drag-over'); });
  el.addEventListener('drop', e => {
    e.preventDefault(); el.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('image/')) loadFile(obj, f);
  });

  // Zoom
  el.querySelector('.btn-zoom').addEventListener('click', e => {
    e.stopPropagation();
    if (obj.imgSrc) { lightboxImg.src = obj.imgSrc; lightbox.classList.add('open'); }
  });

  // Fit toggle
  const fitBtnEl = el.querySelector('.btn-fit');
  const toggleFit = (e) => {
    e && e.stopPropagation();
    obj.fitMode = obj.fitMode === 'contain' ? 'cover' : 'contain';
    img.style.objectFit = obj.fitMode;
    badge.textContent = obj.fitMode;
  };
  fitBtnEl.addEventListener('click', toggleFit);
  badge.addEventListener('click', toggleFit);

  // Remove
  el.querySelector('.btn-remove').addEventListener('click', e => {
    e.stopPropagation(); clearPane(obj);
  });

  // Double-click zoom
  img.addEventListener('dblclick', () => {
    if (obj.imgSrc) { lightboxImg.src = obj.imgSrc; lightbox.classList.add('open'); }
  });

  return obj;
}

function setImage(pane, src, fit = 'contain') {
  pane.imgSrc = src;
  pane.fitMode = fit;
  const img = pane.el.querySelector('.pane-img');
  img.src = src;
  img.style.objectFit = fit;
  pane.el.querySelector('.pane-fit-badge').textContent = fit;
  pane.el.classList.add('has-image');
  updateStatus();
}

function clearPane(pane) {
  pane.imgSrc = null;
  pane.el.querySelector('.pane-img').src = '';
  pane.el.classList.remove('has-image');
  updateStatus();
}

function loadFile(pane, file) {
  const r = new FileReader();
  r.onload = e => setImage(pane, e.target.result);
  r.readAsDataURL(file);
}

function updateStatus() {
  const L = LAYOUTS[currentLayout];
  document.getElementById('statusLayout').textContent = L.label;
  const n = panes.filter(p => p.imgSrc).length;
  document.getElementById('statusLoaded').textContent = `${n} ภาพ`;
}

// ── LAYOUT SWITCHER ──────────────────────────────
document.getElementById('layoutGroup').addEventListener('click', e => {
  const btn = e.target.closest('.layout-btn');
  if (!btn) return;
  document.querySelectorAll('.layout-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentLayout = btn.dataset.layout;
  buildGrid(currentLayout);
});

// ── FILE INPUTS ──────────────────────────────────
fileInput.addEventListener('change', () => {
  if (fileInput.files[0] && pendingIdx >= 0) {
    loadFile(panes[pendingIdx], fileInput.files[0]);
    pendingIdx = -1;
  }
  fileInput.value = '';
});

fileInputAll.addEventListener('change', () => {
  Array.from(fileInputAll.files).forEach((f, i) => {
    if (i < panes.length) loadFile(panes[i], f);
  });
  fileInputAll.value = '';
});

document.getElementById('btnUploadAll').addEventListener('click', () => fileInputAll.click());
document.getElementById('btnClearAll').addEventListener('click', () => panes.forEach(p => clearPane(p)));

// ── LIGHTBOX ─────────────────────────────────────
document.getElementById('lightboxClose').addEventListener('click', () => lightbox.classList.remove('open'));
lightbox.addEventListener('click', e => { if (e.target === lightbox) lightbox.classList.remove('open'); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') lightbox.classList.remove('open'); });

// ── INIT ─────────────────────────────────────────
buildGrid('1');
</script>
</body>
</html>
